<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border-focus: #c9a84c;
    --text: #f0ede6;
    --text-muted: #7a7670;
    --text-dim: #4a4845;
    --accent: #c9a84c;
    --accent-glow: rgba(201,168,76,0.15);
    --accent-dim: rgba(201,168,76,0.08);
    --green: #4caf82;
    --red: #e05c5c;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo { display: flex; flex-direction: column; gap: 4px; }

  .logo-name {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  .logo-name span { color: var(--accent); }

  .logo-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .badge {
    background: var(--accent-dim);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 5px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    padding: 14px 16px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }

  textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  textarea::placeholder { color: var(--text-dim); }

  .message-input { height: 160px; }
  .context-input { height: 60px; }

  .tone-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .tone-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .tone-btn .tone-icon { font-size: 18px; }
  .tone-btn:hover { border-color: var(--accent); color: var(--text); }
  .tone-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .generate-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #0d0d0d;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 15px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }

  .generate-btn:hover:not(:disabled) {
    background: #d9b85c;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(201,168,76,0.3);
  }

  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .output-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .output-box.has-content { border-color: rgba(201,168,76,0.3); }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .output-status {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.2s infinite;
  }

  .status-dot.done {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .output-text {
    padding: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    min-height: 140px;
    white-space: pre-wrap;
  }

  .output-placeholder { color: var(--text-dim); font-style: italic; font-size: 13px; }

  .loading-dots { display: flex; gap: 4px; padding: 20px; align-items: center; }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  .error-msg {
    padding: 12px 16px;
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: var(--radius);
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    font-family: 'DM Mono', monospace;
  }

  .section { margin-bottom: 24px; }
  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  .char-count {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  @media (max-width: 500px) {
    .tone-grid { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-name">Reply<span>AI</span></div>
      <div class="logo-tag">AI-Powered Response Writer</div>
    </div>
    <div class="badge">Beta · Free</div>
  </div>

  <div class="section">
    <div class="section-label">Incoming Message</div>
    <textarea class="message-input" id="messageInput" placeholder="Paste the message you received — email, customer inquiry, review, DM..."></textarea>
    <div class="char-count" id="charCount">0 / 2000</div>
  </div>

  <div class="section">
    <div class="section-label">Your Business (optional)</div>
    <textarea class="context-input" id="contextInput" placeholder="e.g. I run a small Etsy shop selling 3D printed home accessories"></textarea>
  </div>

  <div class="section">
    <div class="section-label">Reply Tone</div>
    <div class="tone-grid">
      <button class="tone-btn active" data-tone="Professional"><span class="tone-icon">💼</span>Professional</button>
      <button class="tone-btn" data-tone="Friendly"><span class="tone-icon">😊</span>Friendly</button>
      <button class="tone-btn" data-tone="Formal"><span class="tone-icon">🎩</span>Formal</button>
      <button class="tone-btn" data-tone="Concise"><span class="tone-icon">⚡</span>Concise</button>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
    </svg>
    Generate Reply
  </button>

  <div id="errorMsg" class="error-msg" style="display:none"></div>

  <div class="divider"></div>

  <div class="section-label">Generated Reply</div>
  <div class="output-box" id="outputBox">
    <div class="output-header">
      <div class="output-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>
      <button class="copy-btn" id="copyBtn" style="display:none" onclick="copyReply()">Copy</button>
    </div>
    <div id="outputContent">
      <div class="output-text output-placeholder">Your AI-generated reply will appear here...</div>
    </div>
  </div>

</div>

<script>
  let selectedTone = 'Professional';

  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTone = btn.dataset.tone;
    });
  });

  const messageInput = document.getElementById('messageInput');
  messageInput.addEventListener('input', () => {
    const len = messageInput.value.length;
    document.getElementById('charCount').textContent = `${len} / 2000`;
  });

  document.getElementById('generateBtn').addEventListener('click', generateReply);

  async function generateReply() {
    const message = messageInput.value.trim();
    if (!message) { showError('Please paste a message to reply to.'); return; }
    if (message.length > 2000) { showError('Message too long. Keep it under 2000 characters.'); return; }

    const context = document.getElementById('contextInput').value.trim();
    hideError();
    setLoading(true);

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, tone: selectedTone, context })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Something went wrong');
      showReply(data.reply);
    } catch (err) {
      showError('Error: ' + err.message);
      setLoading(false, false);
    }
  }

  function setLoading(loading, success) {
    const btn = document.getElementById('generateBtn');
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    btn.disabled = loading;

    if (loading) {
      btn.innerHTML = '<span>Generating...</span>';
      dot.className = 'status-dot active';
      statusText.textContent = 'Writing reply...';
      document.getElementById('outputContent').innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      document.getElementById('outputBox').classList.remove('has-content');
      document.getElementById('copyBtn').style.display = 'none';
    } else {
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg> Generate Reply`;
      dot.className = success !== false ? 'status-dot done' : 'status-dot';
      statusText.textContent = success !== false ? 'Done' : 'Ready';
    }
  }

  function showReply(text) {
    setLoading(false, true);
    document.getElementById('outputContent').innerHTML = `<div class="output-text">${escapeHtml(text)}</div>`;
    document.getElementById('outputBox').classList.add('has-content');
    document.getElementById('copyBtn').style.display = 'block';
  }

  function copyReply() {
    const text = document.querySelector('.output-text')?.innerText;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

  function escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
